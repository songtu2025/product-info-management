<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ app_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', path='css/app.css') }}">
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900">
    <div class="flex min-h-screen">
      <aside class="hidden w-64 shrink-0 border-r border-slate-200 bg-white lg:block">
        <div class="border-b border-slate-200 px-6 py-5">
          <div class="text-sm font-semibold text-blue-800">Amazon Ops</div>
          <div class="mt-1 text-xs text-slate-500">运营数据管理后台</div>
        </div>
        <nav class="space-y-1 px-3 py-4">
          {% for item in ["产品信息", "店铺站点", "Listing 负责人", "数据导入", "后续模块预留"] %}
            <a class="nav-link {% if item == active_nav %}nav-link-active{% endif %}" href="#">
              {{ item }}
            </a>
          {% endfor %}
        </nav>
      </aside>

      <main class="flex min-w-0 flex-1 flex-col">
        <header class="border-b border-slate-200 bg-white">
          <div class="flex min-h-16 items-center justify-between gap-4 px-5 py-3">
            <div>
              <h1 class="text-lg font-semibold text-slate-950">{{ app_name }}</h1>
              <p class="mt-1 text-sm text-slate-500">产品信息管理模块</p>
            </div>
            <div class="hidden items-center gap-2 md:flex">
              <input
                class="h-10 w-72 rounded-md border border-slate-300 px-3 text-sm outline-none focus:border-blue-700 focus:ring-2 focus:ring-blue-100"
                type="search"
                placeholder="搜索 MSKU / ASIN / Listing"
              >
              <button class="btn-secondary" type="button">导出</button>
              <button class="btn-primary" type="button">新增</button>
            </div>
          </div>
        </header>

        <section class="flex-1 px-5 py-5">
          {% block content %}{% endblock %}
        </section>
      </main>
    </div>
  </body>
</html>
