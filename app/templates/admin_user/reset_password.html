{% extends "layout.html" %}

{% block content %}
  <div class="mb-4">
    <a class="text-sm font-medium text-blue-800 hover:underline" href="/admin-users">返回用户管理</a>
    <h2 class="mt-2 text-xl font-semibold text-slate-950">重置密码</h2>
    <p class="mt-1 text-sm text-slate-500">{{ row.username }}。只更新密码哈希，不修改账号、角色和状态。</p>
  </div>

  {% if error %}
    <div class="mb-4 rounded-md border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
      {{ error }}
    </div>
  {% endif %}

  <form class="content-panel" method="post">
    <div class="grid gap-4 p-4 md:grid-cols-2">
      <label class="field">
        <span class="field-label">新密码</span>
        <input class="field-input" name="password" type="password" autocomplete="new-password" required>
      </label>
    </div>
    <div class="flex justify-end gap-2 border-t border-slate-200 px-4 py-4">
      <a class="btn-secondary inline-flex items-center" href="/admin-users">取消</a>
      <button class="btn-primary" type="submit">保存</button>
    </div>
  </form>
{% endblock %}
