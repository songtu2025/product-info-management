{% extends "layout.html" %}

{% macro value(text) -%}
  {{ text if text not in [None, ""] else "" }}
{%- endmacro %}

{% block content %}
  <div class="mb-4">
    <a class="text-sm font-medium text-blue-800 hover:underline" href="/listing-owners">返回 Listing 负责人</a>
    <h2 class="mt-2 text-xl font-semibold text-slate-950">编辑 Listing 负责人</h2>
    <p class="mt-1 text-sm text-slate-500">{{ row.store_site }} · {{ row.listing }}。关联键暂不允许编辑。</p>
  </div>

  {% if error %}
    <div class="mb-4 rounded-md border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
      {{ error }}
    </div>
  {% endif %}

  <form class="content-panel" method="post">
    <div class="grid gap-4 p-4 md:grid-cols-2 xl:grid-cols-3">
      <label class="field">
        <span class="field-label">负责人</span>
        <input class="field-input" name="owner" value="{{ value(row.owner) }}">
      </label>
      <label class="field">
        <span class="field-label">Listing 状态</span>
        <input class="field-input" name="listing_status" value="{{ value(row.listing_status) }}">
      </label>
      <label class="field">
        <span class="field-label">Listing 维护人</span>
        <input class="field-input" name="listing_maintainer" value="{{ value(row.listing_maintainer) }}">
      </label>
      <label class="field">
        <span class="field-label">是否纳入库龄考核</span>
        <input class="field-input" name="include_inventory_age_assessment" value="{{ value(row.include_inventory_age_assessment) }}">
      </label>
      <label class="field">
        <span class="field-label">项目组</span>
        <input class="field-input" name="project_group" value="{{ value(row.project_group) }}">
      </label>
    </div>
    <div class="flex justify-end gap-2 border-t border-slate-200 px-4 py-4">
      <a class="btn-secondary inline-flex items-center" href="/listing-owners">取消</a>
      <button class="btn-primary" type="submit">保存</button>
    </div>
  </form>
{% endblock %}
