<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ app_name }} - 登录</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/tailwind-lite.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/app.css') }}">
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900">
    <main class="login-shell account-login-shell">
      <form class="account-login-panel" method="post">
        <div class="account-login-brand">
          <div class="brand-mark">AO</div>
          <div>
            <h1 class="account-login-title">登录</h1>
            <p class="account-login-subtitle">{{ app_name }}</p>
          </div>
        </div>

        {% if error %}
          <div class="account-login-error" role="alert">
            {{ error }}
          </div>
        {% endif %}

        <input name="next" type="hidden" value="{{ next }}">

        <label class="field mt-5">
          <span class="field-label">账号</span>
          <input class="field-input" name="username" autocomplete="username" required>
        </label>

        <label class="field mt-4">
          <span class="field-label">密码</span>
          <input class="field-input" name="password" type="password" autocomplete="current-password" required>
        </label>

        <button class="btn-primary mt-5 w-full justify-center" type="submit">登录</button>
      </form>
    </main>
  </body>
</html>
