{% extends "partial.html" if request.headers.get("x-partial-request") == "1" else "layout.html" %}

{% block content %}
  <div class="content-panel max-w-xl">
    <div class="border-b border-slate-200 px-4 py-4">
      <h2 class="text-base font-semibold text-slate-950">修改密码</h2>
      <p class="mt-1 text-sm text-slate-500">当前账号：{{ username }}</p>
    </div>

    <form class="space-y-4 p-4" method="post">
      {% if error %}
        <div class="rounded-md border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700">
          {{ error }}
        </div>
      {% endif %}

      <label class="field">
        <span class="field-label">原密码</span>
        <input class="field-input" name="current_password" type="password" autocomplete="current-password" required>
      </label>

      <label class="field">
        <span class="field-label">新密码</span>
        <input class="field-input" name="new_password" type="password" autocomplete="new-password" required>
      </label>

      <label class="field">
        <span class="field-label">确认新密码</span>
        <input class="field-input" name="confirm_password" type="password" autocomplete="new-password" required>
      </label>

      <div class="flex justify-end gap-2 border-t border-slate-200 pt-4">
        <a class="btn-secondary inline-flex items-center" href="/">返回</a>
        <button class="btn-primary" type="submit">保存密码</button>
      </div>
    </form>
  </div>
{% endblock %}
