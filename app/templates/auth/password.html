{% extends "partial.html" if request.headers.get("x-partial-request") == "1" else "layout.html" %}

{% block content %}
  <div class="form-shell account-form-shell">
    <div class="form-page-header">
      <div>
        <a class="detail-back-link" href="/">返回首页</a>
        <h2 class="form-title">修改密码</h2>
        <p class="form-subtitle">当前账号：{{ username }}。提交后只更新当前账号密码哈希。</p>
      </div>
    </div>

    {% if error %}
      <div class="form-alert" role="alert" aria-live="assertive">
        <div class="form-alert-title">修改失败</div>
        <div class="form-alert-message">{{ error }}</div>
      </div>
    {% endif %}

    <form class="content-panel account-form-panel" method="post">
      <section class="form-section">
        <div class="form-section-heading">
          <h3 class="form-section-title">密码校验</h3>
          <p class="form-section-subtitle">先校验原密码，再写入新密码哈希。</p>
        </div>

        <div class="form-grid form-grid-2">
          <label class="field">
            <span class="field-label">原密码</span>
            <input class="field-input" name="current_password" type="password" autocomplete="current-password" required>
          </label>

          <label class="field">
            <span class="field-label">新密码</span>
            <input class="field-input" name="new_password" type="password" autocomplete="new-password" required>
          </label>

          <label class="field">
            <span class="field-label">确认新密码</span>
            <input class="field-input" name="confirm_password" type="password" autocomplete="new-password" required>
          </label>
        </div>
      </section>

      <div class="form-actions">
        <a class="btn-secondary" href="/">取消</a>
        <button class="btn-primary" type="submit">保存密码</button>
      </div>
    </form>
  </div>
{% endblock %}
